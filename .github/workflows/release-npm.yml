name: Publish npm (OIDC)

# Trusted publishing to npm via OIDC — no NODE_AUTH_TOKEN, no 2FA OTP.
# Requires a matching Trusted Publisher configured for @4n6h4x0r/stem-branch on
# npmjs.com (repo h4x0r/stem-branch, workflow release-npm.yml). Trigger with a
# v* tag or manually (Actions -> Publish npm (OIDC) -> Run workflow).

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # mint the OIDC token npm exchanges for publish auth

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      # OIDC trusted publishing needs npm >= 11.5.1; upgrade past the bundled npm.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build # tsup
      - run: npm publish --provenance --access public
