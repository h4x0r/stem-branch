name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build · Lint · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint # tsc --noEmit
      - run: npm run build # tsup
      - run: npm test # vitest run

  audit:
    name: Audit (shipped deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      # The published package ships zero runtime dependencies; gate that tree.
      # Dev-tooling advisories (vitepress/vitest chains) are handled by Renovate.
      - run: npm audit --omit=dev
